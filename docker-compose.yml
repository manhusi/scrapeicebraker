services:
  db:
    image: postgres:16
    container_name: outreach_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: outreach
      POSTGRES_PASSWORD: outreach
      POSTGRES_DB: outreach
    ports:
      - "5432:5432"
    volumes:
      - outreach_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U outreach -d outreach"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  outreach_pgdata:
